# 04-istio-gateway-api/httproute.yaml
# HTTPRoute — owned by the application team, lives in the app namespace.
# Attaches to the Gateway in istio-system via parentRefs.
# Note: this exact resource works unchanged against Envoy Gateway (Option C).

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: default
spec:
  parentRefs:
    - name: demo-gateway
      namespace: istio-system
      sectionName: http              # Attach to the HTTP listener specifically
  hostnames:
    - "myapp.example.com"
  rules:
    # Route all traffic to httpbin
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: httpbin
          port: 80

