# 00-install/tls-secrets.yaml
# Generates a self-signed certificate for myapp.example.com
# Used by all three gateway options for TLS termination
#
# For a real environment, replace with cert-manager or your cert issuing process.
# The Secret name "demo-tls-cert" is referenced by all gateway YAML in this package.
#
# To generate the base64 values for a real cert:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=myapp.example.com/O=demo"
#   kubectl create secret tls demo-tls-cert \
#     --cert=tls.crt --key=tls.key \
#     -n istio-system --dry-run=client -o yaml

---
# Secret in istio-system for Options A and B
apiVersion: v1
kind: Secret
metadata:
  name: demo-tls-cert
  namespace: istio-system
  annotations:
    # Remind operators this is a demo cert
    lab/note: "Self-signed cert for demo — replace in production"
type: kubernetes.io/tls
data:
  # Placeholder values — replace with real base64-encoded cert and key
  # Generate with the openssl command above, then:
  #   cat tls.crt | base64 | tr -d '\n'
  #   cat tls.key | base64 | tr -d '\n'
  tls.crt: REPLACE_WITH_BASE64_CERT
  tls.key: REPLACE_WITH_BASE64_KEY

---
# Same cert in nginx-demo for Option C (Gateway is in nginx-demo; cert must be in same namespace)
apiVersion: v1
kind: Secret
metadata:
  name: demo-tls-cert
  namespace: nginx-demo
  annotations:
    lab/note: "Self-signed cert for demo — replace in production"
type: kubernetes.io/tls
data:
  tls.crt: REPLACE_WITH_BASE64_CERT
  tls.key: REPLACE_WITH_BASE64_KEY
