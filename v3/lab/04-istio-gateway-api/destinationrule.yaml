# 04-istio-gateway-api/destinationrule.yaml
# Required for Gateway API — the gateway pod provisioned per Gateway resource
# does not inherit mTLS defaults from the istioctl installation profile.
# Without this, the gateway cannot verify the upstream sidecar certificate
# and returns: TLS_error: CERTIFICATE_VERIFY_FAILED: SAN matcher
#
# ISTIO_MUTUAL tells the gateway to use Istio-managed certs and derive the
# expected SAN automatically from the service namespace and service account,
# rather than requiring a manually specified SAN.

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: httpbin
  namespace: nginx-demo
spec:
  host: httpbin.nginx-demo.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: echoserver
  namespace: nginx-demo
spec:
  host: echoserver.nginx-demo.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
