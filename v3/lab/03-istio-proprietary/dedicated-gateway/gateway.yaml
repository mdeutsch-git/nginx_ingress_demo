# 03-istio-proprietary/dedicated-gateway/gateway.yaml
# Istio Gateway resource targeting the dedicated gateway workload only.
# The selector "ingress: nginx-migration" matches only the new Deployment —
# the existing istio-ingressgateway (selector: istio: ingressgateway) is unaffected.

---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nginx-migration-gateway
  namespace: istio-system
spec:
  selector:
    ingress: nginx-migration          # targets ONLY the dedicated deployment
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "myapp.example.com"
      # No tls.httpsRedirect = ssl-redirect: false

    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: demo-tls-cert
      hosts:
        - "myapp.example.com"
