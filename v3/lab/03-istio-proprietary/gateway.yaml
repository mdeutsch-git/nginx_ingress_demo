# 03-istio-proprietary/gateway.yaml
# Option A — Istio proprietary API using a dedicated gateway pod.
#
# The selector "ingress: nginx-migration" targets ONLY the dedicated Deployment
# deployed by deployment.yaml. The shared istio-ingressgateway (if present) is
# completely unaffected — its label is "istio: ingressgateway".
#
# Apply order: rbac.yaml → deployment.yaml → gateway.yaml → envoyfilters.yaml → virtualservice.yaml

---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nginx-migration-gateway
  namespace: istio-system
spec:
  selector:
    ingress: nginx-migration          # targets ONLY the dedicated deployment
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "myapp.example.com"
      # Omitting tls.httpsRedirect = ssl-redirect: false

    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: demo-tls-cert
      hosts:
        - "myapp.example.com"
